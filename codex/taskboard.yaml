project: polybash
version: 1
milestones:
  - id: M1
    title: Walking skeleton
    done_when:
      - monorepo scaffold exists
      - contracts and schemas compile and validate
      - CLI validate/export works on canonical fighter fixture
      - desktop shell builds
      - project round-trip passes
      - GLB export and report generation work
      - CI is green
  - id: M2
    title: Authoring MVP
    done_when:
      - fighter, prop, and weapon workflows are usable
      - module browsing, visible transform aids, and undo/redo are usable
      - reusable module authoring and Blender handoff workflows are usable
      - material zones and basic paint layers work within the defined Blender-owned UV pipeline
      - rig template metadata path is stable
  - id: M3
    title: V1
    done_when:
      - additional asset categories supported
      - command DSL integrated with live LLM provider
      - documentation and packaging polished

tasks:
  - id: T-00
    title: Bootstrap monorepo and CI
    milestone: M1
    priority: P0
    lane: trunk
    depends_on: []
    outputs:
      - root workspace files
      - CI skeleton
      - lint/test/build commands
    done_when:
      - cargo and pnpm commands run
      - CI jobs defined
      - docs and examples folders present

  - id: T-01
    title: Define Rust contracts and schema generation
    milestone: M1
    priority: P0
    lane: contracts
    depends_on: [T-00]
    outputs:
      - project contracts
      - style pack contracts
      - validation report contracts
      - generated JSON Schema
    done_when:
      - valid examples pass
      - invalid examples fail
      - schema generation reproducible

  - id: T-02
    title: Add canonical examples and fixtures
    milestone: M1
    priority: P0
    lane: contracts
    depends_on: [T-01]
    outputs:
      - fighter example
      - style pack example
      - command example
      - negative fixtures
    done_when:
      - examples used in tests
      - examples match docs

  - id: T-03
    title: Implement domain aggregate and command application
    milestone: M1
    priority: P0
    lane: core
    depends_on: [T-01]
    outputs:
      - project normalization
      - command apply/preview
      - invariant checks
    done_when:
      - domain tests green
      - preview/apply behavior tested

  - id: T-04
    title: Implement connector and region ops
    milestone: M1
    priority: P0
    lane: core
    depends_on: [T-03]
    outputs:
      - connector compatibility
      - transform helpers
      - region parameter math
    done_when:
      - property tests green
      - deterministic snapshots stable

  - id: T-05
    title: Implement validator pipeline
    milestone: M1
    priority: P0
    lane: core
    depends_on: [T-03, T-04]
    outputs:
      - typed validator
      - report generation
    done_when:
      - positive and negative fixtures covered
      - report snapshots stable

  - id: T-06
    title: Implement GLB exporter
    milestone: M1
    priority: P0
    lane: core
    depends_on: [T-03, T-05]
    outputs:
      - export bundle
      - deterministic output path
    done_when:
      - canonical fighter fixture exports
      - repeated export stable

  - id: T-07
    title: Implement CLI validate/export commands
    milestone: M1
    priority: P0
    lane: core
    depends_on: [T-05, T-06]
    outputs:
      - validate command
      - export command
      - inspect/report command
    done_when:
      - CLI integration tests green

  - id: T-08
    title: Expose WASM bridge
    milestone: M1
    priority: P0
    lane: bridge
    depends_on: [T-05, T-06]
    outputs:
      - TS-facing validation/export bridge
    done_when:
      - parity tests between WASM/native exist

  - id: T-09
    title: Build desktop shell and state model
    milestone: M1
    priority: P0
    lane: desktop
    depends_on: [T-00, T-01]
    outputs:
      - desktop entry point
      - controller layer
      - desktop bridge seams
    done_when:
      - desktop shell builds
      - controller tests green

  - id: T-10
    title: Implement project workflow
    milestone: M1
    priority: P0
    lane: desktop
    depends_on: [T-08, T-09]
    outputs:
      - new/open/save flow
      - style pack load flow
    done_when:
      - project round-trip green in desktop tests

  - id: T-11
    title: Implement assembly workflow
    milestone: M1
    priority: P0
    lane: desktop
    depends_on: [T-08, T-09]
    outputs:
      - browse/place/snap/mirror modules
    done_when:
      - assembly acceptance tests green

  - id: T-12
    title: Implement deformation workflow
    milestone: M1
    priority: P0
    lane: desktop
    depends_on: [T-08, T-11]
    outputs:
      - region control flow
      - clamp and persist logic
    done_when:
      - deformation acceptance tests green

  - id: T-13
    title: Implement material workflow
    milestone: M1
    priority: P0
    lane: desktop
    depends_on: [T-08, T-11]
    outputs:
      - material zone assignment
      - basic paint layer model
    done_when:
      - material acceptance tests green

  - id: T-14
    title: Implement rig metadata workflow
    milestone: M1
    priority: P0
    lane: desktop
    depends_on: [T-08, T-10]
    outputs:
      - rig template select
      - socket metadata
    done_when:
      - rig acceptance tests green

  - id: T-15
    title: Implement acceptance harness and release docs
    milestone: M1
    priority: P0
    lane: qa
    depends_on: [T-05, T-06, T-10, T-11, T-12, T-13, T-14]
    outputs:
      - acceptance suite
      - smoke checklist
      - gap report format
    done_when:
      - every P0 requirement mapped
      - release gate summary exists

  - id: T-16
    title: Define LLM command DSL
    milestone: M2
    priority: P1
    lane: core
    depends_on: [T-03, T-08]
    outputs:
      - command schemas
      - preview/apply command path
      - negative fixtures
    done_when:
      - valid and invalid command tests green

  - id: T-17
    title: Extend paint workflow
    milestone: M2
    priority: P1
    lane: desktop
    depends_on: [T-13]
    outputs:
      - decals
      - richer paint UX
    done_when:
      - paint acceptance tests extended

  - id: T-18
    title: Extend rigging fidelity
    milestone: M2
    priority: P1
    lane: core-desktop
    depends_on: [T-14, T-06]
    outputs:
      - richer rig export
      - additional weighting modes
    done_when:
      - extended rig fixtures green

  - id: T-19
    title: Add module preview browser workflow
    milestone: M2
    priority: P1
    lane: desktop
    depends_on: [T-11]
    outputs:
      - module preview panel
      - clearer style-pack module thumbnails or proxy previews
      - selection-ready module inspection before placement
    done_when:
      - desktop tests cover preview browsing and selection
      - module placement flow is understandable without trial-and-error

  - id: T-20
    title: Surface usable desktop undo and redo controls
    milestone: M2
    priority: P1
    lane: desktop
    depends_on: [T-11, T-12, T-13]
    outputs:
      - visible undo control
      - visible redo control
      - action history affordance
    done_when:
      - desktop tests cover multi-step undo and redo
      - shell users can recover from common editing mistakes without reloading

  - id: T-21
    title: Add viewport orientation and transform gizmos
    milestone: M2
    priority: P1
    lane: desktop
    depends_on: [T-11, T-12]
    outputs:
      - world orientation widget
      - visible translate and scale gizmos
      - clearer transform affordances in the viewport
    done_when:
      - desktop interaction tests cover gizmo-driven transforms
      - viewport affordances are visible without relying on hidden drag modifiers

  - id: T-22
    title: Visualize connector points and snap targets
    milestone: M2
    priority: P1
    lane: desktop
    depends_on: [T-11]
    outputs:
      - visible connector markers
      - snap-point highlighting
      - connector compatibility feedback in the viewport
    done_when:
      - desktop tests cover connector point visibility state
      - users can identify valid connection points before attaching or snapping

  - id: T-23
    title: Implement reusable module metadata authoring workflow
    milestone: M2
    priority: P1
    lane: desktop
    depends_on: [T-11, T-12, T-13, T-19, T-22]
    outputs:
      - connector authoring flow
      - material-zone authoring flow
      - region metadata authoring flow
      - reusable module draft editing
    done_when:
      - desktop tests cover authoring connector, region, and material metadata on reusable modules
      - authored module metadata persists cleanly into reusable module records

  - id: T-24
    title: Implement Blender handoff and module import pipeline
    milestone: M2
    priority: P1
    lane: core-desktop
    depends_on: [T-10, T-11, T-13, T-23]
    outputs:
      - Blender export contract for module source meshes
      - module import flow into PolyBash
      - imported module fixture coverage
      - authoring docs for Blender handoff
    done_when:
      - a Blender-authored canonical module fixture imports into the desktop shell
      - imported modules can be previewed, placed, validated, and exported without manual JSON editing

  - id: T-25
    title: Implement reusable style-pack and module library workflow
    milestone: M2
    priority: P1
    lane: desktop
    depends_on: [T-19, T-23, T-24]
    outputs:
      - reusable module library management
      - style-pack assembly and save flow
      - author-facing module preview/browser surface
    done_when:
      - users can save and reload reusable authored modules and style-pack content
      - desktop tests cover library browsing and placement of user-authored modules

  - id: T-26
    title: Define texture and material authoring strategy with Blender-owned UV contract
    milestone: M2
    priority: P1
    lane: core-desktop
    depends_on: [T-13, T-24]
    outputs:
      - explicit material and texture pipeline docs
      - validator rules for imported material-zone and UV expectations
      - fixtures that encode the Blender-owned UV stance
    done_when:
      - docs and fixtures make it explicit that UV unwrap/editing stays in Blender for M2
      - imported modules validate against the declared material-zone and UV contract

quality_gates:
  - cargo fmt --check
  - cargo clippy --workspace --all-targets -- -D warnings
  - cargo test --workspace
  - pnpm lint
  - pnpm typecheck
  - pnpm test
  - pnpm build
  - coverage thresholds satisfied
